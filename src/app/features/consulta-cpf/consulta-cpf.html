<recipiente
  [titulo]="'Nova Admissão Cooperado'"
  [breadcrumb]="'Cadastro / Admissão do Cooperado / Nova Admissão'"
>
  <passos [listaPassos]="listaPassos" [passoAtual]="passoAtual"></passos>

  <form [formGroup]="formulario" class="consulta-cpf-form">
    <campo
      rotulo="CPF"
      mascaraCpf
      placeholder="000.000.000-00"
      formControlName="cpf"
      (input)="atualizarMensagemCpf()"
      [mensagemErro]="mensagemCpf()"
    />

    <botao
      class="btn-consultar-por-cpf"
      texto="Consultar por CPF"
      [desabilitado]="formulario.invalid"
      [processando]="processando()"
      (click)="consultarPorCpf()"
    />
  </form>

  <quadro titulo="Situação cadastral do CPF" subtitulo="Consulta na Receita Federal">
    <item icone="ok" rotulo="Nome" [texto]="'aaaaaaaaaaaaaaaa dddda ddddddcf'" estado="sucesso">
    </item>

    <item icone="cartao" rotulo="Situação do CPF" [texto]="'ddddd'"> </item>
  </quadro>
</recipiente>
