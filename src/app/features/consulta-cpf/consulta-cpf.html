<recipiente
  [titulo]="'Nova Admissão Cooperado'"
  [breadcrumb]="'Cadastro / Admissão do Cooperado / Nova Admissão'"
>
  <passos [listaPassos]="listaPassos" [passoAtual]="passoAtual"></passos>

  <form [formGroup]="formulario">
    <campo
      rotulo="CPF"
      placeholder="000.000.000-00"
      formControlName="cpf"
      [mensagemErro]="mensagemCpf()"
    />
  </form>
</recipiente>
