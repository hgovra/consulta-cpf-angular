<button
  class="botao"
  [class.processando]="processando()"
  [class.contorno]="estilo() === 'contorno'"
  [class.link]="estilo() === 'link'"
  [attr.type]="tipo()"
  [disabled]="desabilitado()"
>
  @if (processando()) {
    <span class="processando"></span>
  } @else {
    {{ texto() }}
  }
</button>
