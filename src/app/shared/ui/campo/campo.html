<div class="campo">
  <label class="campo__rotulo">
    {{ rotulo() }}
  </label>

  <input
    class="campo__controle"
    [value]="valorInterno()"
    [type]="tipo()"
    [placeholder]="placeholder() ?? ''"
    [disabled]="desabilitado()"
    (input)="atualizarValor($event)"
    (blur)="marcarComoTocado()"
  />

  @if (mensagemErro()) {
    <span class="campo__mensagem-erro">
      {{ mensagemErro() }}
    </span>
  }
</div>
