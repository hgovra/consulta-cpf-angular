<div class="item">
  <div class="item__icone">
    @if (icone()) {
      <icone [nome]="icone()!" [tamanho]="32" [cor]="cor()" />
    }
  </div>

  <div class="item__texto">
    <span class="item__rotulo">
      {{ rotulo() }}
    </span>

    @if (texto()) {
      <span class="item__valor">
        {{ texto() }}
      </span>
    } @else {
      <span class="item__valor nao-informado">Não informado</span>
    }
  </div>
</div>
