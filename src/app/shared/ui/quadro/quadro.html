<section class="quadro" [class.quadro--visivel]="visivel()">
  <header class="quadro__header">
    @if (titulo()) {
      <h2 class="quadro__titulo">
        {{ titulo() }}
      </h2>
    }

    @if (subtitulo()) {
      <p class="quadro__subtitulo">
        {{ subtitulo() }}
      </p>
    }
  </header>

  <div class="quadro__conteudo">
    <ng-content />
  </div>
</section>
